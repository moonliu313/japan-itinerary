<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>東北・北海道行程表</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F6F4EE;
    --paper-raised:#FFFEFB;
    --ink:#1B2430;
    --ink-soft:#5A6272;
    --ink-faint:#9AA0AC;
    --line:#DAD6C9;
    --line-strong:#C7C2B2;
    --steel:#2F5D8A;
    --steel-soft:#E7EEF4;
    --vermillion:#BB4430;
    --vermillion-soft:#F6E7E3;
    --gold:#C9A24B;
    --gold-soft:#F7EFDD;
    --violet:#6B4C9A;
    --violet-soft:#EEE8F5;
    --green:#4C7A57;
    --green-soft:#E7EFE9;
    --shadow: 0 1px 2px rgba(27,36,48,0.06), 0 4px 14px rgba(27,36,48,0.05);
    --shadow-lg: 0 8px 30px rgba(27,36,48,0.18);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Noto Sans SC',sans-serif;
    font-weight:400;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  .app{max-width:940px;margin:0 auto;padding:28px 20px 80px;}

  /* ---------- Header ---------- */
  .hero{
    border-bottom:1px solid var(--line-strong);
    padding-bottom:22px;
    margin-bottom:22px;
  }
  .hero-top{display:flex; justify-content:space-between; align-items:flex-start; gap:20px; flex-wrap:wrap;}
  .hero-eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:0.16em;
    color:var(--ink-faint);
    text-transform:uppercase;
    margin-bottom:8px;
  }
  .hero-title{
    font-size:28px;
    font-weight:700;
    letter-spacing:-0.01em;
    margin:0 0 6px;
  }
  .hero-sub{
    font-size:13.5px;
    color:var(--ink-soft);
    max-width:46ch;
  }

  /* ---------- Route list ---------- */
  .geo-legend{margin-top:18px;}
  .geo-city-btn{
    display:flex;
    align-items:baseline;
    gap:10px;
    width:100%;
    text-align:left;
    background:none;
    border:none;
    border-bottom:1px solid var(--line);
    padding:9px 2px;
    cursor:pointer;
    font-family:inherit;
  }
  .geo-city-btn:hover .geo-city-name{color:var(--vermillion);}
  .geo-city-day{
    font-family:'JetBrains Mono',monospace;
    font-size:10.5px;
    color:var(--ink-faint);
    flex:0 0 44px;
  }
  .geo-city-name{font-size:13.5px; font-weight:600; color:var(--ink);}
  .geo-city-route{font-size:11.5px; color:var(--ink-soft); display:block; margin-top:1px;}

  /* ---------- Tabs ---------- */
  .tabs{
    display:flex;
    gap:2px;
    margin-bottom:22px;
    border-bottom:1px solid var(--line);
    flex-wrap:wrap;
  }
  .tab{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    letter-spacing:0.05em;
    padding:10px 14px;
    background:none;
    border:none;
    border-bottom:2px solid transparent;
    color:var(--ink-faint);
    cursor:pointer;
    white-space:nowrap;
  }
  .tab:hover{color:var(--ink-soft);}
  .tab.active{color:var(--ink);border-bottom-color:var(--vermillion);font-weight:600;}
  .tab .count{display:inline-block; margin-left:5px; color:var(--ink-faint);}

  /* ---------- Day header ---------- */
  .day-head{
    display:flex; justify-content:space-between; align-items:baseline;
    margin-bottom:4px; flex-wrap:wrap; gap:8px;
  }
  .day-head h2{font-size:19px; margin:0; font-weight:700;}
  .day-route-edit{
    width:100%; font-size:13px; color:var(--ink-soft);
    border:none; background:none; padding:2px 0 14px;
    font-family:inherit; border-bottom:1px dashed transparent;
  }
  .day-route-edit:hover, .day-route-edit:focus{border-bottom:1px dashed var(--line-strong); outline:none;}

  /* ---------- Timeline ---------- */
  .timeline{position:relative; padding-left:2px; margin-top:10px;}
  .stop{
    position:relative;
    display:grid;
    grid-template-columns:64px 1fr auto;
    gap:12px;
    padding:12px 0 12px 18px;
    border-left:2px solid var(--line);
    margin-left:6px;
  }
  .stop:before{
    content:'';
    position:absolute; left:-7px; top:18px;
    width:11px;height:11px; border-radius:50%;
    background:var(--paper-raised);
    border:2px solid var(--cat-color, var(--steel));
  }
  .stop:last-child{border-left:2px solid transparent;}
  .stop-time{
    font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:600;
    color:var(--ink); padding-top:1px; white-space:nowrap;
  }
  .stop-main{min-width:0;}
  .stop-type-row{display:flex; align-items:center; gap:6px; margin-bottom:2px;}
  .cat-chip{
    display:inline-flex; align-items:center; gap:4px;
    font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.06em;
    padding:2px 6px; border-radius:2px;
    color:var(--cat-color); background:var(--cat-bg); text-transform:uppercase;
  }
  .stop-dur{font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--ink-faint);}
  .stop-name{
    font-size:15px; font-weight:600; color:var(--ink); margin:2px 0 2px;
    cursor:default;
  }
  .stop-name.has-info{cursor:pointer; text-decoration:underline; text-decoration-color:var(--line-strong); text-underline-offset:3px;}
  .stop-name.has-info:hover{text-decoration-color:var(--vermillion); color:var(--vermillion);}
  .stop-notes{font-size:12.5px; color:var(--ink-soft); white-space:pre-wrap;}
  .stop-address{
    display:inline-flex; align-items:center; gap:4px; margin-top:5px;
    font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--steel); text-decoration:none;
  }
  .stop-address:hover{text-decoration:underline;}
  .stop-address svg{width:11px;height:11px;flex:0 0 auto;}
  .stop-actions{display:flex; flex-direction:column; gap:2px; align-items:flex-end;}
  .icon-btn{
    background:none; border:none; cursor:pointer; color:var(--ink-faint);
    padding:3px; line-height:0; border-radius:2px;
  }
  .icon-btn:hover{color:var(--ink); background:var(--line-strong);}
  .icon-btn svg{width:13px;height:13px;display:block;}
  .icon-btn.info-btn{color:var(--steel);}
  .icon-btn.info-btn:hover{background:var(--steel-soft);}
  .stop-actions-row{display:flex;gap:1px;}

  .add-row{margin:14px 0 4px 24px;}
  .add-btn{
    font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:0.03em;
    background:none; border:1px dashed var(--line-strong); color:var(--ink-soft);
    padding:8px 14px; cursor:pointer; border-radius:2px;
  }
  .add-btn:hover{border-color:var(--vermillion); color:var(--vermillion);}

  /* ---------- Edit form ---------- */
  .edit-card{
    background:var(--paper-raised); border:1px solid var(--line-strong);
    box-shadow:var(--shadow); border-radius:2px; padding:16px; margin:10px 0 10px 24px;
  }
  .edit-grid{display:grid; grid-template-columns:100px 1fr; gap:10px 12px; align-items:center;}
  .edit-grid label{
    font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:0.05em;
    color:var(--ink-faint); text-transform:uppercase;
  }
  .edit-grid input, .edit-grid select, .edit-grid textarea{
    font-family:'Noto Sans SC',sans-serif; font-size:13.5px; padding:7px 9px;
    border:1px solid var(--line-strong); border-radius:2px; background:var(--paper); color:var(--ink); width:100%;
  }
  .edit-grid textarea{resize:vertical; min-height:44px; font-family:'Noto Sans SC',sans-serif;}
  .edit-grid input:focus, .edit-grid select:focus, .edit-grid textarea:focus{outline:none; border-color:var(--steel);}
  .edit-actions{display:flex; justify-content:flex-end; gap:8px; margin-top:12px;}
  .btn{
    font-family:'JetBrains Mono',monospace; font-size:12px; padding:7px 16px;
    border-radius:2px; cursor:pointer; border:1px solid var(--line-strong); background:var(--paper); color:var(--ink-soft);
  }
  .btn:hover{color:var(--ink);}
  .btn-primary{background:var(--ink); border-color:var(--ink); color:var(--paper-raised);}
  .btn-primary:hover{background:#000; color:#fff;}
  .btn-danger{color:var(--vermillion); border-color:var(--vermillion-soft);}
  .btn-danger:hover{background:var(--vermillion-soft);}

  /* ---------- Idea bank ---------- */
  .bank-intro{font-size:13px; color:var(--ink-soft); margin-bottom:18px; max-width:60ch;}
  .idea-card{
    display:grid; grid-template-columns:1fr auto; gap:10px; padding:14px 16px;
    border:1px solid var(--line); border-radius:2px; background:var(--paper-raised); margin-bottom:10px;
  }
  .idea-name{font-size:14.5px; font-weight:600; margin-bottom:3px;}
  .idea-notes{font-size:12.5px; color:var(--ink-soft);}
  .idea-assign{display:flex; flex-direction:column; gap:6px; align-items:flex-end;}
  .idea-assign select{
    font-family:'JetBrains Mono',monospace; font-size:11px; padding:5px 7px;
    border:1px solid var(--line-strong); border-radius:2px; background:var(--paper);
  }
  .empty-state{
    padding:34px 18px; text-align:center; color:var(--ink-faint); font-size:13px;
    border:1px dashed var(--line-strong); border-radius:2px;
  }

  footer.credit{
    margin-top:40px; padding-top:16px; border-top:1px solid var(--line);
    font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--ink-faint);
    display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px;
  }
  .save-indicator{color:var(--green); opacity:0; transition:opacity .3s;}
  .save-indicator.show{opacity:1;}

  /* ---------- Detail modal ---------- */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(27,36,48,0.45);
    display:flex; align-items:center; justify-content:center; padding:20px; z-index:50;
  }
  .modal-card{
    background:var(--paper-raised); width:100%; max-width:420px; max-height:88vh; overflow-y:auto;
    border-radius:3px; box-shadow:var(--shadow-lg);
  }
  .modal-photo{width:100%; height:200px; object-fit:cover; display:block; background:var(--line);}
  .modal-hero{width:100%; height:150px; display:flex; align-items:center; justify-content:center;}
  .modal-hero svg{width:56px; height:56px; stroke-width:1.1;}
  .modal-body{padding:18px 20px 20px;}
  .modal-cat{margin-bottom:8px;}
  .modal-title{font-size:18px; font-weight:700; margin:0 0 10px;}
  .modal-row{
    display:flex; gap:10px; padding:8px 0; border-top:1px solid var(--line);
    font-size:13px; color:var(--ink-soft); align-items:flex-start;
  }
  .modal-row:first-of-type{border-top:none;}
  .modal-row svg{flex:0 0 auto; width:15px; height:15px; margin-top:1px; color:var(--ink-faint);}
  .modal-row a{color:var(--steel); text-decoration:none;}
  .modal-row a:hover{text-decoration:underline;}
  .modal-close-row{display:flex; justify-content:flex-end; margin-top:14px;}
  .modal-notice{font-size:11.5px; color:var(--ink-faint); margin-top:14px; padding-top:10px; border-top:1px dashed var(--line);}

  @media (max-width:560px){
    .stop{grid-template-columns:52px 1fr auto; gap:8px; padding-left:14px;}
    .edit-grid{grid-template-columns:1fr;}
    .edit-grid label{margin-top:4px;}
  }
</style>
</head>

/* ---------------- State + persistence ---------------- */
let state = null;
let activeTab = 'd1';
let editing = null;
let modalKey = null;
const STORAGE_KEY = 'japan-itinerary-v14';

async function loadState(){
  try{
    const res = await window.storage.get(STORAGE_KEY);
    state = JSON.parse(res.value);
  }catch(e){
    state = seedData();
    await persist();
  }
  render();
}
async function persist(){
  try{
    await window.storage.set(STORAGE_KEY, JSON.stringify(state));
    flashSaved();
  }catch(e){ console.error('save failed', e); }
}
function flashSaved(){
  const el = document.getElementById('save-flag');
  if(!el) return;
  el.classList.add('show');
  clearTimeout(window.__saveTimer);
  window.__saveTimer = setTimeout(()=>el.classList.remove('show'), 1200);
}
function uid(){ return 's'+Math.random().toString(36).slice(2,9); }
function mapsQueryUrl(address){
  return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(address);
}

/* ---------------- Render ---------------- */
function render(){
  const app = document.getElementById('app');
  app.innerHTML = `
    ${renderHero()}
    ${renderTabs()}
    <div id="tab-content">${activeTab==='ideas' ? renderIdeaBank() : renderDay(activeTab)}</div>
    <footer class="credit">
      <span>数据保存在本浏览器 · 自动同步</span>
      <span id="save-flag" class="save-indicator">已保存 ✓</span>
    </footer>
    ${modalKey ? renderModal() : ''}
  `;
  attachHeroEvents();
  attachTabEvents();
  if(activeTab==='ideas'){ attachIdeaEvents(); } else { attachDayEvents(activeTab); }
  attachModalEvents();
}

/* ---------------- Hero + geo map ---------------- */
function renderHero(){
  return `
  <div class="hero">
    <div class="hero-top">
      <div>
        <div class="hero-eyebrow">JR EAST &amp; HOKKAIDO · RAIL ITINERARY</div>
        <h1 class="hero-title">${escapeHtml(state.tripTitle)}</h1>
        <div class="hero-sub">点下面的日期可以跳到那一天的行程；点行程里带下划线的站点名可以看照片、地址、营业时间。</div>
      </div>
    </div>
    <div class="geo-legend">
      ${state.days.map(d=>`
        <button class="geo-city-btn" data-goto="${d.id}">
          <span class="geo-city-day">${d.label}</span>
          <span>
            <span class="geo-city-name">${escapeHtml(d.date)}</span>
            <span class="geo-city-route">${escapeHtml(d.route)}</span>
          </span>
        </button>
      `).join('')}
    </div>
  </div>`;
}

function attachHeroEvents(){
  document.querySelectorAll('[data-goto]').forEach(b=>{
    b.addEventListener('click', ()=>{ activeTab=b.dataset.goto; editing=null; render(); });
  });
}

/* ---------------- Tabs ---------------- */
function renderTabs(){
  return `
  <div class="tabs">
    ${state.days.map(d=>`<button class="tab ${activeTab===d.id?'active':''}" data-tab="${d.id}">${d.label}</button>`).join('')}

}
function attachTabEvents(){
  document.querySelectorAll('[data-tab]').forEach(b=>{

  });
}

/* ---------------- Day / stops ---------------- */
function renderDay(dayId){
  const day = state.days.find(d=>d.id===dayId);
  if(!day) return '';
  return `
    <div class="day-head">
      <h2>${day.label} <span style="font-weight:400;color:var(--ink-soft);">${day.date}</span></h2>
    </div>
    <input class="day-route-edit" data-day="${day.id}" value="${escapeAttr(day.route)}" placeholder="这一天的路线概述…">
    <div class="timeline">
      ${day.stops.map((s,i)=>renderStop(day,s,i)).join('')}
    </div>
    <div class="add-row">
      <button class="add-btn" data-add-day="${day.id}">+ 添加行程</button>
    </div>
  `;
}

function renderStop(day, s, idx){
  const cat = CATS[s.type] || CATS.other;
  const isEditing = editing && editing.dayId===day.id && editing.stopId===s.id;
  if(isEditing){ return renderEditForm(day, s); }
  const infoKey = day.id+'-'+s.id;
  const info = PLACE_INFO[infoKey];
  const addr = (info && info.address) || s.address || '';
  const mapsLink = (info && info.mapsUrl) || (addr ? mapsQueryUrl(addr) : '');
  const hasInfo = !!info || !!addr;
  return `
  <div class="stop" style="--cat-color:${cat.color};--cat-bg:${cat.bg}">
    <div class="stop-time">${escapeHtml(s.time||'')}</div>
    <div class="stop-main">
      <div class="stop-type-row">
        <span class="cat-chip">${cat.icon}${cat.label}</span>
        ${s.dur ? `<span class="stop-dur">${escapeHtml(s.dur)}</span>` : ''}
      </div>
      <div class="stop-name ${hasInfo?'has-info':''}" ${hasInfo?`data-open-info="${infoKey}" data-title="${escapeAttr(s.name)}" data-cat="${s.type}"`:''}>${escapeHtml(s.name)}</div>
      ${s.notes ? `<div class="stop-notes">${escapeHtml(s.notes)}</div>` : ''}
      ${mapsLink ? `
      <a class="stop-address" href="${mapsLink}" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 12-9 12s-9-5-9-12a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        ${escapeHtml(addr || '在 Google 地图中查看')}
      </a>`: ''}
    </div>
    <div class="stop-actions">
      <div class="stop-actions-row">
        <button class="icon-btn" title="上移" data-move="up" data-day="${day.id}" data-stop="${s.id}" ${idx===0?'disabled style="opacity:.25"':''}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M6 15l6-6 6 6"/></svg>
        </button>
        <button class="icon-btn" title="下移" data-move="down" data-day="${day.id}" data-stop="${s.id}" ${idx===day.stops.length-1?'disabled style="opacity:.25"':''}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M6 9l6 6 6-6"/></svg>
        </button>
      </div>
      <div class="stop-actions-row">
        ${hasInfo?`
        <button class="icon-btn info-btn" title="查看详情" data-open-info="${infoKey}" data-title="${escapeAttr(s.name)}" data-cat="${s.type}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v5h1"/></svg>
        </button>`:''}
        <button class="icon-btn" title="编辑" data-edit="${s.id}" data-day="${day.id}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
        </button>
        <button class="icon-btn" title="删除" data-del="${s.id}" data-day="${day.id}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6h16z"/></svg>
        </button>
      </div>
    </div>
  </div>`;
}

function renderEditForm(day, s){
  return `
  <div class="edit-card" data-editcard="${s.id}">
    <div class="edit-grid">
      <label>时间</label><input type="text" data-field="time" value="${escapeAttr(s.time)}" placeholder="09:00 或 全天">

function splitKey(k){
  const i = k.indexOf('-');
  return [k.slice(0,i), k.slice(i+1)];
}
function attachModalEvents(){
  document.querySelectorAll('[data-open-info]').forEach(el=>{
    el.addEventListener('click', ()=>{ modalKey = el.dataset.openInfo; render(); });
  });
  const overlay = document.getElementById('modal-overlay');
  if(overlay){
    overlay.addEventListener('click', (e)=>{ if(e.target.id==='modal-overlay'){ modalKey=null; render(); } });
  }
  const closeBtn = document.getElementById('modal-close');
  if(closeBtn){ closeBtn.addEventListener('click', ()=>{ modalKey=null; render(); }); }
}

/* ---------------- Event wiring: day/stop editing ---------------- */
function attachDayEvents(dayId){
  const day = state.days.find(d=>d.id===dayId);
  const routeInput = document.querySelector(`.day-route-edit[data-day="${dayId}"]`);
  if(routeInput){
    routeInput.addEventListener('change', async ()=>{ day.route = routeInput.value; await persist(); });
  }
  document.querySelectorAll('[data-move]').forEach(b=>{
    b.addEventListener('click', async ()=>{
      const d = state.days.find(x=>x.id===b.dataset.day);
      const idx = d.stops.findIndex(s=>s.id===b.dataset.stop);
      const swapIdx = idx + (b.dataset.move==='up'?-1:1);
      if(swapIdx<0||swapIdx>=d.stops.length) return;
      [d.stops[idx], d.stops[swapIdx]] = [d.stops[swapIdx], d.stops[idx]];
      await persist(); render();
    });
  });
  document.querySelectorAll('[data-edit]').forEach(b=>{
    b.addEventListener('click', ()=>{ editing = {dayId:b.dataset.day, stopId:b.dataset.edit}; render(); focusEditCard(); });
  });
  document.querySelectorAll('[data-del]').forEach(b=>{
    b.addEventListener('click', async ()=>{
      const d = state.days.find(x=>x.id===b.dataset.day);
      d.stops = d.stops.filter(s=>s.id!==b.dataset.del);
      await persist(); render();
    });
  });
  const addBtn = document.querySelector('[data-add-day]');
  if(addBtn){
    addBtn.addEventListener('click', async ()=>{
      const d = state.days.find(x=>x.id===addBtn.dataset.addDay);
      const newStop = {id:uid(), time:'', name:'新行程', type:'sight', dur:'', notes:'', address:''};
      d.stops.push(newStop);
      editing = {dayId:d.id, stopId:newStop.id};
      await persist(); render(); focusEditCard();
    });
  }
  attachEditFormEvents();
}
function attachEditFormEvents(){
  const cancel = document.querySelector('[data-cancel-edit]');
  if(cancel){ cancel.addEventListener('click', ()=>{ editing=null; render(); }); }
  const save = document.querySelector('[data-save-edit]');
  if(save){
    save.addEventListener('click', async ()=>{
      const day = state.days.find(d=>d.id===save.dataset.day);
      const stop = day.stops.find(s=>s.id===save.dataset.stop);
      const card = document.querySelector(`[data-editcard="${stop.id}"]`);
      stop.time = card.querySelector('[data-field="time"]').value.trim();
      stop.name = card.querySelector('[data-field="name"]').value.trim() || '未命名行程';
      stop.type = card.querySelector('[data-field="type"]').value;
      stop.dur = card.querySelector('[data-field="dur"]').value.trim();
      stop.address = card.querySelector('[data-field="address"]').value.trim();
      stop.notes = card.querySelector('[data-field="notes"]').value.trim();
      editing = null;
      await persist(); render();
    });
  }
}
function focusEditCard(){
  setTimeout(()=>{
    const input = document.querySelector('.edit-card input[data-field="name"]');
    if(input){ input.focus(); input.select(); }
  }, 30);
}

/* ---------------- Idea bank events ---------------- */
function attachIdeaEvents(){
  const addBtn = document.querySelector('[data-add-idea]');
  if(addBtn){
    addBtn.addEventListener('click', ()=>{
      const slot = document.getElementById('idea-edit-slot');
      slot.innerHTML = `
        <div class="edit-card">
          <div class="edit-grid">
            <label>名称</label><input type="text" id="idea-name" placeholder="餐厅 / 景点 / 想法">
            <label>类型</label>
            <select id="idea-type">${Object.entries(CATS).map(([k,v])=>`<option value="${k}">${v.label}</option>`).join('')}</select>
            <label>地址</label><input type="text" id="idea-address" placeholder="粘贴地址（可选），会自动生成 Google 地图链接">
            <label>备注</label><textarea id="idea-notes" placeholder="推荐菜、链接、注意事项…"></textarea>
          </div>
          <div class="edit-actions">
            <button class="btn btn-danger" id="idea-cancel">取消</button>
            <button class="btn btn-primary" id="idea-save">加入清单</button>
          </div>
        </div>`;
      document.getElementById('idea-cancel').addEventListener('click', ()=>{slot.innerHTML='';});
      document.getElementById('idea-save').addEventListener('click', async ()=>{
        const name = document.getElementById('idea-name').value.trim();
        if(!name) return;
        state.ideas.push({
          id: uid(), name,
          type: document.getElementById('idea-type').value,
          address: document.getElementById('idea-address').value.trim(),
          notes: document.getElementById('idea-notes').value.trim()
        });
        await persist(); render();
      });
      document.getElementById('idea-name').focus();
    });
  }
  document.querySelectorAll('[data-idea-del]').forEach(b=>{
    b.addEventListener('click', async ()=>{
      state.ideas = state.ideas.filter(i=>i.id!==b.dataset.ideaDel);
      await persist(); render();
    });
  });
  document.querySelectorAll('[data-assign-go]').forEach(b=>{
    b.addEventListener('click', async ()=>{
      const id = b.dataset.assignGo;
      const select = document.querySelector(`[data-assign-select="${id}"]`);
      const dayId = select.value;
      if(!dayId) return;
      const idea = state.ideas.find(i=>i.id===id);
      const day = state.days.find(d=>d.id===dayId);
      day.stops.push({id:uid(), time:'待定', name:idea.name, type:idea.type, dur:'', notes:idea.notes, address:idea.address||''});
      state.ideas = state.ideas.filter(i=>i.id!==id);
      await persist();
      activeTab = dayId;
      render();
    });
  });
}

/* ---------------- utils ---------------- */
function escapeHtml(str){
  return String(str||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function escapeAttr(str){ return escapeHtml(str); }
